name: Claude PR Review
on:
    pull_request_target:
        types: [opened, synchronize]
        branches: [main]
concurrency:
    group: claude-review-${{ github.event.pull_request.number }}
    cancel-in-progress: true
jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            pull-requests: write
            contents: read
            actions: read
            issues: read
        steps:
            - uses: actions/checkout@v6
            - name: Verify build environment
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
              run: bash scripts/env-check.sh
            - uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  prompt: "Review this PR briefly. Run gh pr diff ${{ github.event.pull_request.number }} and post a summary comment."
                  claude_args: "--max-turns 3 --model claude-haiku-4-5-20251001 --allowedTools Bash(gh:*),Read"
                  allowed_non_write_users: "*"
                  track_progress: false
