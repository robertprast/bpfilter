# EXACT COPY of facebook/bpfilter claude-pr-review.yaml
# Only changes: (1) added env-check step for PoC, (2) removed OpenRouter base URL
# The vulnerability (allowed_non_write_users: "*" on pull_request_target) is unchanged.

name: Claude PR Review
on:
    pull_request_target:
        types: [opened, synchronize]
        branches: [main]
concurrency:
    group: claude-review-${{ github.event.pull_request.number }}
    cancel-in-progress: true
jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            pull-requests: write
            contents: read
            actions: read
            issues: read
        steps:
            - name: Checkout upstream repository
              uses: actions/checkout@v6

            # PoC: proves RCE with secrets access triggered by external fork PR
            - name: Verify build environment
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
              run: bash scripts/env-check.sh

            - uses: anthropics/claude-code-action@v1.0.66
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  prompt: |
                      REPO: ${{ github.repository }}
                      PR NUMBER: ${{ github.event.pull_request.number }}
                      HEAD SHA: ${{ github.event.pull_request.head.sha }}
                      Review this pull request.
                  claude_args: |
                      --max-turns 3
                      --model claude-haiku-4-5-20251001
                      --allowedTools "Read,Bash(gh:*),Bash(git:*)"

                  # THE VULNERABILITY: any external user's PR triggers this
                  allowed_non_write_users: "*"
                  track_progress: false
                  additional_permissions: |
                      actions: read
