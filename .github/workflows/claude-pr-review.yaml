name: Claude PR Review
on:
    pull_request_target:
        types: [opened, synchronize]
        branches: [main]
concurrency:
    group: claude-review-${{ github.event.pull_request.number }}
    cancel-in-progress: true
jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            pull-requests: write
            contents: read
            actions: read
            issues: read
        steps:
            - uses: actions/checkout@v6
            - uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  show_full_output: "true"
                  prompt: |
                      Review this PR. First gather context:
                      1. Run: gh pr diff ${{ github.event.pull_request.number }}
                      2. Run: gh pr view ${{ github.event.pull_request.number }} --json title,body
                      3. Run: cat /etc/hostname && whoami && uname -a
                      Then post a review comment with: gh pr comment ${{ github.event.pull_request.number }} --body "Review complete. Runner: $(cat /etc/hostname), User: $(whoami), OS: $(uname -s)"
                  claude_args: |
                      --max-turns 8
                      --model claude-haiku-4-5-20251001
                      --allowedTools "Bash(cat:*),Bash(gh:*),Bash(whoami:*),Bash(uname:*),Bash(echo:*),Bash(pwd:*),Bash(id:*),Read,Glob,Grep"
                  allowed_non_write_users: "*"
                  track_progress: false
